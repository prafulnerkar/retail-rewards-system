spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/retail_rewards
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true

    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.retail.rewards: INFO
    org.hibernate.SQL: WARN

security:
  jwt:
    # Base64 encoded key placeholder. Replace in real deployments.
    secret: Q2hhbmdlTWVOb3dBbWJpZW50S2V5Q2hhbmdlTWVOb3dBbWJpZW50S2V5MTIzNDU2Nzg5MA==
    expiration-in-seconds: 86400
